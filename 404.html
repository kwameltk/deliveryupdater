<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found</title>
  <style>
    :root {
      --amber: #F59E0B;
      --dark: #111827;
      --mid: #6B7280;
      --bg: #F9FAFB;
      --white: #ffffff;
      --border: #E5E7EB;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--dark);
      padding: 20px;
    }
    .card {
      max-width: 520px;
      width: 100%;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(17, 24, 39, 0.06);
    }
    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #FEF3C7;
      color: #92400E;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 14px 0 8px;
      font-size: 28px;
    }
    p {
      margin: 0 0 16px;
      font-size: 14px;
      color: var(--mid);
      line-height: 1.6;
    }
    a {
      display: inline-block;
      text-decoration: none;
      background: var(--amber);
      color: var(--dark);
      font-weight: 700;
      padding: 10px 16px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">GitHub Pages fallback</div>
    <h1>Page Not Found</h1>
    <p>The page you requested is unavailable. Redirecting you back to the live delivery tracker.</p>
    <a href="./index.html">Go to Home</a>
  </div>

  <script>
    window.location.replace('./index.html');
  </script>
</body>
</html>
